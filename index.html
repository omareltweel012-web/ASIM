<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Builder Pro | المنصة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { Send, Layout, Shield, Users, Settings, Plus, Download, Edit3, Loader2 } = lucide;

        const App = () => {
            const [sites, setSites] = useState([]);
            const [input, setInput] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [previewHtml, setPreviewHtml] = useState('');

            const buildWebsite = () => {
                if(!input) return;
                setIsGenerating(true);

                // محرك التصميم الاحترافي
                setTimeout(() => {
                    const html = `
                        <html>
                        <head><script src="https://cdn.tailwindcss.com"><\/script></head>
                        <body class="bg-gray-50 p-10 font-sans">
                            <div class="max-w-4xl mx-auto bg-white p-12 rounded-3xl shadow-xl">
                                <h1 class="text-5xl font-black text-gray-900 mb-6">${input}</h1>
                                <p class="text-xl text-gray-600 mb-8">هذا الموقع تم تصميمه بواسطة محرك الذكاء الاصطناعي الاحترافي.</p>
                                <button class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold">ابدأ التجربة</button>
                            </div>
                        </body>
                        </html>
                    `;
                    setPreviewHtml(html);
                    setSites([{ id: Date.now(), name: input, html }, ...sites]);
                    setIsGenerating(false);
                }, 1500);
            };

            const downloadCode = () => {
                const blob = new Blob([previewHtml], {type: 'text/html'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'my-site.html';
                a.click();
            };

            return (
                <div className="h-screen flex flex-col md:flex-row">
                    <aside className="w-full md:w-72 bg-[#0a0a0a] p-6 border-l border-white/10 flex flex-col gap-8">
                        <h2 className="text-2xl font-black text-blue-500">AI PRO BUILDER</h2>
                        <nav className="space-y-4">
                            <button className="flex items-center gap-3 w-full p-3 bg-blue-600 rounded-xl"><Plus size={20}/> إنشاء جديد</button>
                            <button className="flex items-center gap-3 w-full p-3 hover:bg-white/5 rounded-xl text-gray-400"><Users size={20}/> المواقع المخزنة</button>
                        </nav>
                    </aside>

                    <main className="flex-1 p-6 flex flex-col gap-6">
                        <div className="flex gap-4">
                            <input 
                                className="flex-1 bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-blue-500"
                                placeholder="صف موقعك الاحترافي (مثال: متجر ساعات فاخرة)..."
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                            />
                            <button onClick={buildWebsite} className="bg-blue-600 px-8 rounded-2xl font-bold hover:bg-blue-700 transition">
                                {isGenerating ? <Loader2 className="animate-spin"/> : "توليد الموقع"}
                            </button>
                        </div>

                        <div className="flex-1 glass rounded-3xl p-6 overflow-hidden relative">
                            {previewHtml ? (
                                <>
                                    <div className="absolute top-8 right-8 flex gap-2">
                                        <button onClick={downloadCode} className="bg-green-600 p-3 rounded-xl"><Download size={20}/></button>
                                        <button className="bg-yellow-600 p-3 rounded-xl"><Edit3 size={20}/></button>
                                    </div>
                                    <iframe srcDoc={previewHtml} className="w-full h-full rounded-2xl bg-white" />
                                </>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-gray-500 gap-4">
                                    <Layout size={64} className="opacity-20"/>
                                    <p>أدخل وصفاً للموقع ليبدأ الذكاء الاصطناعي بالعمل</p>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
