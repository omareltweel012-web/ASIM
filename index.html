<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="joke-wrapper">
            <div class="header">
                <h1>😂 Joke Generator</h1>
                <p>Get a random laugh whenever you need one!</p>
            </div>

            <div class="joke-display">
                <div id="jokeContent" class="joke-content">
                    <p class="placeholder">Click the button below to get a joke...</p>
                </div>
            </div>

            <div class="button-section">
                <button id="getJokeBtn" class="get-joke-btn">Get Joke</button>
                <button id="shareBtn" class="share-btn" style="display: none;">Share</button>
            </div>

            <div class="category-section">
                <label for="categorySelect">Select Category:</label>
                <select id="categorySelect" class="category-select">
                    <option value="any">Any Category</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock Knock</option>
                </select>
            </div>

            <div class="stats">
                <p>Jokes Loaded: <span id="jokeCount">0</span></p>
                <button id="clearHistoryBtn" class="clear-history-btn">Clear History</button>
            </div>

            <div id="jokeHistory" class="joke-history">
                <h3>📚 Joke History</h3>
                <ul id="historyList" class="history-list"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
